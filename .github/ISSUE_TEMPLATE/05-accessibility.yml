name: Accessibility issue
description: Report a barrier involving keyboard use, screen readers, contrast, motion, audio, focus, or readability.
title: "[Accessibility]: "
body:
  - type: dropdown
    id: barrier
    attributes:
      label: Type of barrier
      options:
        - Keyboard navigation
        - Screen reader or semantic structure
        - Focus visibility or focus order
        - Colour contrast
        - Motion or animation
        - Audio or sound cues
        - Text size or readability
        - Touch target or mobile interaction
        - Cognitive load or time pressure
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Barrier encountered
      description: Explain what prevented or made it difficult to use the game.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps or interaction path
      description: Describe how to reach the affected screen or control.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected accessible experience
      description: Explain what would allow you to complete the task successfully.
    validations:
      required: true

  - type: input
    id: assistive_technology
    attributes:
      label: Assistive technology
      description: Optional. Include a screen reader, switch device, zoom level, or other setup.
      placeholder: For example, NVDA 2026.1 with Firefox

  - type: input
    id: environment
    attributes:
      label: Browser, device, and operating system
      placeholder: For example, Safari on macOS with keyboard only
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional. Share any solution or established pattern that may help.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing accessibility issues.
          required: true
